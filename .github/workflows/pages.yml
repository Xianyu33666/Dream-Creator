name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Build index.html with language switcher
        run: |
          cat > index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Dream Creator</title>
              <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
              <style>
                  * { margin: 0; padding: 0; box-sizing: border-box; }
                  body {
                      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
                      line-height: 1.6;
                      color: #24292f;
                      background: #ffffff;
                  }
                  .header {
                      background: #f6f8fa;
                      border-bottom: 1px solid #d0d7de;
                      padding: 16px 32px;
                      display: flex;
                      justify-content: space-between;
                      align-items: center;
                  }
                  .lang-switcher {
                      display: flex;
                      gap: 8px;
                  }
                  .lang-switcher button {
                      padding: 6px 12px;
                      border: 1px solid #d0d7de;
                      background: #ffffff;
                      border-radius: 6px;
                      cursor: pointer;
                      font-size: 14px;
                      transition: all 0.2s;
                  }
                  .lang-switcher button:hover {
                      background: #f3f4f6;
                  }
                  .lang-switcher button.active {
                      background: #0969da;
                      color: white;
                      border-color: #0969da;
                  }
                  .container {
                      max-width: 900px;
                      margin: 0 auto;
                      padding: 32px;
                  }
                  .markdown-body {
                      font-size: 16px;
                      line-height: 1.6;
                  }
                  .markdown-body h1 { font-size: 2em; border-bottom: 1px solid #d0d7de; padding-bottom: 0.3em; margin-top: 0; }
                  .markdown-body h2 { font-size: 1.5em; border-bottom: 1px solid #d0d7de; padding-bottom: 0.3em; margin-top: 24px; }
                  .markdown-body h3 { font-size: 1.25em; margin-top: 24px; }
                  .markdown-body code {
                      background: rgba(175,184,193,0.2);
                      padding: 0.2em 0.4em;
                      border-radius: 6px;
                      font-family: ui-monospace, SFMono-Regular, monospace;
                  }
                  .markdown-body pre {
                      background: #f6f8fa;
                      padding: 16px;
                      border-radius: 6px;
                      overflow-x: auto;
                  }
                  .markdown-body pre code { background: none; padding: 0; }
                  .markdown-body blockquote {
                      border-left: 4px solid #d0d7de;
                      padding-left: 16px;
                      color: #656d76;
                  }
                  .markdown-body table {
                      border-collapse: collapse;
                      width: 100%;
                      margin: 16px 0;
                  }
                  .markdown-body th, .markdown-body td {
                      border: 1px solid #d0d7de;
                      padding: 6px 13px;
                  }
                  .markdown-body th {
                      background: #f6f8fa;
                  }
                  .loading {
                      text-align: center;
                      padding: 40px;
                      color: #656d76;
                  }
              </style>
          </head>
          <body>
              <div class="header">
                  <h1 style="font-size: 20px; margin: 0;">🚀 Dream Creator</h1>
                  <div class="lang-switcher">
                      <button class="active" onclick="switchLang('en')">English</button>
                      <button onclick="switchLang('zh-CN')">简体中文</button>
                      <button onclick="switchLang('zh-TW')">繁體中文</button>
                  </div>
              </div>
              <div class="container">
                  <div id="content" class="markdown-body">
                      <div class="loading">Loading...</div>
                  </div>
              </div>
          
              <script>
                  const files = {
                      'en': 'README.md',
                      'zh-CN': 'README.zh-CN.md',
                      'zh-TW': 'README.zh-TW.md'
                  };
          
                  function switchLang(lang) {
                      // Update button states
                      document.querySelectorAll('.lang-switcher button').forEach(btn => {
                          btn.classList.remove('active');
                      });
                      event.target.classList.add('active');
                      
                      // Load content
                      loadContent(lang);
                      
                      // Update URL without page reload
                      const url = new URL(window.location);
                      url.searchParams.set('lang', lang);
                      window.history.pushState({}, '', url);
                  }
          
                  async function loadContent(lang) {
                      const contentDiv = document.getElementById('content');
                      contentDiv.innerHTML = '<div class="loading">Loading...</div>';
                      
                      try {
                          const response = await fetch(files[lang]);
                          const text = await response.text();
                          
                          // Remove HTML comments
                          let cleanText = text.replace(/<!--[\s\S]*?-->/g, '');
                          
                          // Remove the language switcher line from content
                          cleanText = cleanText.replace(/\*\*Language:\*\*.*?\n/, '');
                          cleanText = cleanText.replace(/\*\*语言：\*\*.*?\n/, '');
                          
                          // Render markdown
                          contentDiv.innerHTML = marked.parse(cleanText);
                      } catch (error) {
                          contentDiv.innerHTML = '<div class="loading">Error loading content</div>';
                      }
                  }
          
                  // Load initial language from URL or default to English
                  const urlParams = new URLSearchParams(window.location.search);
                  const initialLang = urlParams.get('lang') || 'en';
                  
                  // Set initial button state
                  document.querySelectorAll('.lang-switcher button').forEach(btn => {
                      btn.classList.remove('active');
                  });
                  const langIndex = {'en': 0, 'zh-CN': 1, 'zh-TW': 2}[initialLang] || 0;
                  document.querySelectorAll('.lang-switcher button')[langIndex]?.classList.add('active');
                  
                  loadContent(initialLang);
              </script>
          </body>
          </html>
          EOF
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
